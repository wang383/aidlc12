<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单管理 - 列表页</title>
  <link rel="stylesheet" href="../libs/element-plus.css" />
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f5f7fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .page-container {
      max-width: 1200px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .page-header h2 {
      margin: 0;
      font-size: 20px;
      color: #303133;
    }
    .search-area {
      margin-bottom: 20px;
      padding: 16px;
      background: #fafafa;
      border-radius: 6px;
    }
    .table-area {
      margin-bottom: 20px;
    }
    .pagination-area {
      display: flex;
      justify-content: flex-end;
      padding-top: 16px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-container">
      <!-- 页面标题 -->
      <div class="page-header">
        <h2>订单管理</h2>
        <div>
          <el-button type="primary" @click="handleAdd">
            <el-icon><Plus></Plus></el-icon>
            新增
          </el-button>
          <el-button @click="handleExport">
            <el-icon><Download></Download></el-icon>
            导出
          </el-button>
        </div>
      </div>

      <!-- 搜索区域 -->
      <div class="search-area">
        <el-form :model="searchForm" :inline="true">
          <el-form-item label="订单编号">
            <el-input v-model="searchForm.orderNo" placeholder="请输入订单编号" clearable></el-input>
          </el-form-item>
          <el-form-item label="客户名称">
            <el-input v-model="searchForm.customerName" placeholder="请输入客户名称" clearable></el-input>
          </el-form-item>
          <el-form-item label="状态">
            <el-select v-model="searchForm.status" placeholder="请选择状态" clearable>
              <el-option label="待审核" value="待审核"></el-option>
              <el-option label="已通过" value="已通过"></el-option>
              <el-option label="已拒绝" value="已拒绝"></el-option>
            </el-select>
          </el-form-item>
          <el-form-item>
            <el-button type="primary" @click="handleSearch">
              <el-icon><Search></Search></el-icon>
              搜索
            </el-button>
            <el-button @click="handleReset">
              <el-icon><RefreshRight></RefreshRight></el-icon>
              重置
            </el-button>
          </el-form-item>
        </el-form>
      </div>

      <!-- 数据表格 -->
      <div class="table-area">
        <el-table :data="pagedData" border stripe style="width: 100%">
          <el-table-column prop="orderNo" label="订单编号" width="160"></el-table-column>
          <el-table-column prop="customerName" label="客户名称" min-width="150"></el-table-column>
          <el-table-column prop="amount" label="订单金额" width="130" align="right">
            <template #default="{ row }">
              <span style="color: #f56c6c; font-weight: 600">¥ {{ row.amount.toLocaleString('zh-CN', { minimumFractionDigits: 2 }) }}</span>
            </template>
          </el-table-column>
          <el-table-column prop="status" label="状态" width="100" align="center">
            <template #default="{ row }">
              <el-tag :type="statusTypeMap[row.status]">{{ row.status }}</el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="createdAt" label="创建时间" width="170" align="center"></el-table-column>
          <el-table-column label="操作" width="160" align="center" fixed="right">
            <template #default="{ row }">
              <el-button type="primary" link size="small" @click="handleEdit(row)">
                <el-icon><Edit></Edit></el-icon>
                编辑
              </el-button>
              <el-button type="danger" link size="small" @click="handleDelete(row)">
                <el-icon><Delete></Delete></el-icon>
                删除
              </el-button>
            </template>
          </el-table-column>
        </el-table>
      </div>

      <!-- 分页 -->
      <div class="pagination-area">
        <el-pagination
          v-model:current-page="currentPage"
          v-model:page-size="pageSize"
          :page-sizes="[5, 10, 20, 50]"
          :total="filteredData.length"
          layout="total, sizes, prev, pager, next, jumper"
          @size-change="handleSizeChange"
          @current-change="handleCurrentChange"
        ></el-pagination>
      </div>

      <!-- 新增/编辑对话框 -->
      <el-dialog
        v-model="dialogVisible"
        :title="dialogTitle"
        width="520px"
        destroy-on-close
      >
        <el-form
          ref="dialogFormRef"
          :model="dialogForm"
          :rules="dialogRules"
          label-width="100px"
        >
          <el-form-item label="订单编号" prop="orderNo">
            <el-input v-model="dialogForm.orderNo" placeholder="请输入订单编号"></el-input>
          </el-form-item>
          <el-form-item label="客户名称" prop="customerName">
            <el-input v-model="dialogForm.customerName" placeholder="请输入客户名称"></el-input>
          </el-form-item>
          <el-form-item label="订单金额" prop="amount">
            <el-input-number
              v-model="dialogForm.amount"
              :min="0"
              :max="99999999"
              :precision="2"
              :step="100"
              controls-position="right"
              style="width: 100%"
            ></el-input-number>
          </el-form-item>
          <el-form-item label="状态" prop="status">
            <el-radio-group v-model="dialogForm.status">
              <el-radio value="待审核">待审核</el-radio>
              <el-radio value="已通过">已通过</el-radio>
              <el-radio value="已拒绝">已拒绝</el-radio>
            </el-radio-group>
          </el-form-item>
        </el-form>
        <template #footer>
          <el-button @click="dialogVisible = false">取消</el-button>
          <el-button type="primary" @click="handleSubmit">确定</el-button>
        </template>
      </el-dialog>
    </div>
  </div>

  <script src="../libs/vue.global.prod.js"></script>
  <script src="../libs/element-plus.js"></script>
  <script src="../libs/icons-vue.js"></script>
  <script>
    const { createApp, ref, reactive, computed } = Vue
    const { ElMessage, ElMessageBox } = ElementPlus

    const app = createApp({
      setup() {
        // 状态颜色映射
        const statusTypeMap = {
          '待审核': 'warning',
          '已通过': 'success',
          '已拒绝': 'danger'
        }

        // 搜索表单
        const searchForm = reactive({
          orderNo: '',
          customerName: '',
          status: ''
        })

        // 模拟数据
        const tableData = ref([
          { id: 1, orderNo: 'ORD-2026-0001', customerName: '上海锦程科技有限公司', amount: 128500.00, status: '已通过', createdAt: '2026-04-01 09:30:00' },
          { id: 2, orderNo: 'ORD-2026-0002', customerName: '北京华美集团', amount: 86200.50, status: '待审核', createdAt: '2026-04-03 14:20:00' },
          { id: 3, orderNo: 'ORD-2026-0003', customerName: '深圳天宇电子科技', amount: 45800.00, status: '已拒绝', createdAt: '2026-04-05 10:15:00' },
          { id: 4, orderNo: 'ORD-2026-0004', customerName: '杭州博远贸易有限公司', amount: 92100.00, status: '已通过', createdAt: '2026-04-06 08:45:00' },
          { id: 5, orderNo: 'ORD-2026-0005', customerName: '广州新创软件技术', amount: 156000.00, status: '待审核', createdAt: '2026-04-08 16:30:00' },
          { id: 6, orderNo: 'ORD-2026-0006', customerName: '成都云端信息技术', amount: 33750.00, status: '已通过', createdAt: '2026-04-10 11:00:00' },
          { id: 7, orderNo: 'ORD-2026-0007', customerName: '武汉光谷智能科技', amount: 210000.00, status: '待审核', createdAt: '2026-04-11 09:10:00' },
          { id: 8, orderNo: 'ORD-2026-0008', customerName: '南京紫金山数据服务', amount: 67800.00, status: '已拒绝', createdAt: '2026-04-13 13:25:00' },
          { id: 9, orderNo: 'ORD-2026-0009', customerName: '重庆山城物流集团', amount: 189500.00, status: '已通过', createdAt: '2026-04-15 15:40:00' },
          { id: 10, orderNo: 'ORD-2026-0010', customerName: '西安丝路电商平台', amount: 54300.00, status: '已通过', createdAt: '2026-04-17 10:50:00' },
          { id: 11, orderNo: 'ORD-2026-0011', customerName: '天津滨海新材料', amount: 78900.00, status: '待审核', createdAt: '2026-04-18 08:30:00' },
          { id: 12, orderNo: 'ORD-2026-0012', customerName: '苏州工业园区精密制造', amount: 345000.00, status: '已通过', createdAt: '2026-04-19 14:15:00' },
          { id: 13, orderNo: 'ORD-2026-0013', customerName: '青岛海信智慧城市', amount: 112600.00, status: '已拒绝', createdAt: '2026-04-20 09:20:00' },
          { id: 14, orderNo: 'ORD-2026-0014', customerName: '长沙麓谷创新科技', amount: 29800.00, status: '待审核', createdAt: '2026-04-22 11:35:00' },
          { id: 15, orderNo: 'ORD-2026-0015', customerName: '厦门鹭岛进出口贸易', amount: 468000.00, status: '已通过', createdAt: '2026-04-24 16:00:00' }
        ])

        // 分页
        const currentPage = ref(1)
        const pageSize = ref(10)

        // 过滤后的数据
        const filteredData = computed(() => {
          return tableData.value.filter(item => {
            const orderNoMatch = !searchForm.orderNo || item.orderNo.toLowerCase().includes(searchForm.orderNo.toLowerCase())
            const customerMatch = !searchForm.customerName || item.customerName.includes(searchForm.customerName)
            const statusMatch = !searchForm.status || item.status === searchForm.status
            return orderNoMatch && customerMatch && statusMatch
          })
        })

        // 分页后的数据
        const pagedData = computed(() => {
          const start = (currentPage.value - 1) * pageSize.value
          const end = start + pageSize.value
          return filteredData.value.slice(start, end)
        })

        // 对话框
        const dialogVisible = ref(false)
        const dialogTitle = ref('新增订单')
        const dialogFormRef = ref(null)
        const editingId = ref(null)
        const dialogForm = reactive({
          orderNo: '',
          customerName: '',
          amount: null,
          status: '待审核'
        })
        const dialogRules = {
          orderNo: [{ required: true, message: '请输入订单编号', trigger: 'blur' }],
          customerName: [{ required: true, message: '请输入客户名称', trigger: 'blur' }],
          amount: [{ required: true, message: '请输入订单金额', trigger: 'blur' }],
          status: [{ required: true, message: '请选择状态', trigger: 'change' }]
        }

        // 方法
        const handleSearch = () => { currentPage.value = 1 }

        const handleReset = () => {
          searchForm.orderNo = ''
          searchForm.customerName = ''
          searchForm.status = ''
          currentPage.value = 1
        }

        const handleAdd = () => {
          dialogTitle.value = '新增订单'
          editingId.value = null
          dialogForm.orderNo = ''
          dialogForm.customerName = ''
          dialogForm.amount = null
          dialogForm.status = '待审核'
          dialogVisible.value = true
        }

        const handleEdit = (row) => {
          dialogTitle.value = '编辑订单'
          editingId.value = row.id
          dialogForm.orderNo = row.orderNo
          dialogForm.customerName = row.customerName
          dialogForm.amount = row.amount
          dialogForm.status = row.status
          dialogVisible.value = true
        }

        const handleDelete = (row) => {
          ElMessageBox.confirm(`确定要删除订单「${row.orderNo}」吗？`, '提示', {
            confirmButtonText: '确定',
            cancelButtonText: '取消',
            type: 'warning'
          }).then(() => {
            const index = tableData.value.findIndex(item => item.id === row.id)
            if (index > -1) {
              tableData.value.splice(index, 1)
              ElMessage.success('删除成功')
            }
          }).catch(() => {})
        }

        const handleSubmit = () => {
          if (!dialogFormRef.value) return
          dialogFormRef.value.validate((valid) => {
            if (valid) {
              if (editingId.value) {
                const index = tableData.value.findIndex(item => item.id === editingId.value)
                if (index > -1) {
                  tableData.value[index] = {
                    ...tableData.value[index],
                    orderNo: dialogForm.orderNo,
                    customerName: dialogForm.customerName,
                    amount: dialogForm.amount,
                    status: dialogForm.status
                  }
                  ElMessage.success('编辑成功')
                }
              } else {
                const newId = Math.max(...tableData.value.map(item => item.id)) + 1
                const now = new Date()
                const createdAt = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`
                tableData.value.unshift({
                  id: newId,
                  orderNo: dialogForm.orderNo,
                  customerName: dialogForm.customerName,
                  amount: dialogForm.amount,
                  status: dialogForm.status,
                  createdAt
                })
                ElMessage.success('新增成功')
              }
              dialogVisible.value = false
            }
          })
        }

        const handleExport = () => { ElMessage.success('导出功能已触发') }
        const handleSizeChange = (val) => { pageSize.value = val; currentPage.value = 1 }
        const handleCurrentChange = (val) => { currentPage.value = val }

        return {
          statusTypeMap,
          searchForm,
          tableData,
          currentPage,
          pageSize,
          filteredData,
          pagedData,
          dialogVisible,
          dialogTitle,
          dialogFormRef,
          dialogForm,
          dialogRules,
          handleSearch,
          handleReset,
          handleAdd,
          handleEdit,
          handleDelete,
          handleSubmit,
          handleExport,
          handleSizeChange,
          handleCurrentChange
        }
      }
    })

    app.use(ElementPlus)
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component)
    }
    app.mount('#app')
  </script>
</body>
</html>
